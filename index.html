<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>BrainWhisperer demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #0e0f13;
      --panel: #151823;
      --accent: #4f7cff;
      --text: #e8eaf0;
      --muted: #7a7f98;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 900px;
      max-width: 95vw;
      background: var(--panel);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .trial-select {
      padding: 8px 12px;
      background: rgba(79, 124, 255, 0.1);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .trial-select:hover {
      background: rgba(79, 124, 255, 0.2);
    }

    .trial-select:focus {
      outline: none;
      background: rgba(79, 124, 255, 0.3);
    }

    .trial-select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .play {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .play:hover:not(.disabled) {
      opacity: 0.9;
    }

    .play.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .play::before {
      content: "";
      width: 0;
      height: 0;
      border-left: 10px solid white;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      margin-left: 2px;
    }

    .canvas-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    canvas {
      display: block;
      width: 100%;
      height: 220px;
      position: relative;
      z-index: 0;
    }

    .playhead {
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 100%;
      background: rgba(255, 255, 255, .85);
      pointer-events: none;
      z-index: 20;
    }

    .transcription {
      margin-top: 14px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, .04);
      border-radius: 12px;
      min-height: 48px;
      font-size: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .transcription-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 14px;
    }

    .transcription-column {
      flex: 1;
    }

    .transcription-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .transcription-box {
      padding: 12px 16px;
      background: rgba(255, 255, 255, .04);
      border-radius: 12px;
      min-height: 48px;
      font-size: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .word {
      transition: opacity .25s ease, transform .25s ease;
      position: relative;
      display: inline-block;
    }

    .word.new {
      opacity: 0;
      transform: translateY(6px);
    }

    .word.old-out {
      animation: outDown .25s ease forwards;
    }

    @keyframes outDown {
      to {
        opacity: 0;
        transform: translateY(6px);
      }
    }

    .word.mismatch {
      animation: highlightMismatch .25s ease forwards;
    }

    @keyframes highlightMismatch {
      0% {
        color: var(--text);
      }

      50% {
        color: #4f7cff;
      }

      100% {
        color: #4f7cff;
      }
    }

    .footer {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <h1>BrainWhisperer demo</h1>
      <div class="controls">
        <select class="trial-select" id="trialSelect" disabled>
          <option value="0">Trial 0</option>
          <option value="1">Trial 1</option>
          <option value="2">Trial 2</option>
          <option value="3">Trial 3</option>
          <option value="4">Trial 4</option>
          <option value="5">Trial 5</option>
          <option value="6">Trial 6</option>
          <option value="7">Trial 7</option>
          <option value="8">Trial 8</option>
          <option value="9">Trial 9</option>
          <option value="10">Trial 10</option>
        </select>
        <div class="play disabled" id="play"></div>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="spec"></canvas>
      <div class="consumed"></div>
      <div class="playhead"></div>
    </div>

    <div class="transcription-section">
      <div class="transcription-column">
        <div class="transcription-label">Ground Truth</div>
        <div class="transcription-box" id="groundTruth"></div>
      </div>
      <div class="transcription-column">
        <div class="transcription-label">Decoded</div>
        <div class="transcription-box" id="transcription"></div>
      </div>
    </div>
  </div>

  <script>
    // ======= CONFIGURATION =======
    // Base path for data files (relative to HTML file location)
    const DATA_BASE_PATH = "./data";

    // ======= DOM ELEMENTS =======
    const view = document.getElementById("spec");
    const viewCtx = view.getContext("2d");
    const playBtn = document.getElementById("play");
    const trialSelect = document.getElementById("trialSelect");
    const transcriptionEl = document.getElementById("transcription");
    const groundTruthEl = document.getElementById("groundTruth");
    const canvasWrap = document.querySelector('.canvas-wrap');

    const W = view.width = 900;
    const H = view.height = 220;

    // ======= TEMPORAL MAPPING =======
    const FRAME_MS = 10;
    const FRAME_WIDTH = 2;
    const centerX = () => Math.floor(view.getBoundingClientRect().width / 2);

    // ======= ASR LATENCY =======
    const ASR_DELAY_FRAMES = 0;

    // ======= TRIAL DATA STATE =======
    let trialData = null;
    let spectrogram = null;
    let totalFrames = 0;
    let currentFrame = 0;
    let transcriptions = [];
    let currentTranscriptionIndex = 0;

    // ======= UI STATE =======
    let running = false;
    let lastWords = [];
    let currentTrial = 0;
    let isLoadingTrial = false;
    let isRewinding = false;
    let groundTruthWords = [];

    // Large canvas that contains whole spectrogram
    let specLayer = document.createElement('canvas');
    specLayer.id = 'specLayer';
    specLayer.style.position = 'absolute';
    specLayer.style.left = '0';
    specLayer.style.top = '0';
    specLayer.style.height = H + 'px';
    specLayer.style.willChange = 'transform';
    specLayer.style.zIndex = '1';
    specLayer.style.pointerEvents = 'none';
    canvasWrap.appendChild(specLayer);
    const specCtx = specLayer.getContext('2d');

    /* ---------- data loading ---------- */

    async function loadTrialData(trialId) {
      isLoadingTrial = true;
      setControlsEnabled(false);

      try {
        const response = await fetch(`${DATA_BASE_PATH}/trial_${trialId}.json`);
        if (!response.ok) {
          throw new Error(`Failed to load trial ${trialId}`);
        }
        trialData = await response.json();

        spectrogram = trialData.spectrogram;
        totalFrames = trialData.frames;
        transcriptions = trialData.transcriptions || [];

        if (trialData.ground_truth) {
          displayGroundTruth(trialData.ground_truth);
        }

        drawInitialSpectrogram();
        setControlsEnabled(true);
      } catch (error) {
        console.error("Error loading trial:", error);
      } finally {
        isLoadingTrial = false;
      }
    }

    function setControlsEnabled(enabled) {
      trialSelect.disabled = !enabled;
      if (enabled) {
        playBtn.classList.remove("disabled");
      } else {
        playBtn.classList.add("disabled");
      }
    }

    /* ---------- transcription ---------- */

    function updateTranscription(words) {
      const children = Array.from(transcriptionEl.children);

      words.forEach((w, i) => {
        const existing = children[i];

        if (!existing) {
          const span = document.createElement("span");
          span.textContent = w;
          span.className = "word new";
          transcriptionEl.appendChild(span);
          requestAnimationFrame(() => span.classList.remove("new"));
        } else if (existing.textContent === w) {
          // Same word
        } else {
          const newSpan = document.createElement("span");
          newSpan.textContent = w;
          newSpan.className = "word new";
          transcriptionEl.insertBefore(newSpan, existing);
          requestAnimationFrame(() => newSpan.classList.remove("new"));

          existing.classList.add("old-out");
          existing.addEventListener("animationend", () => {
            if (existing.parentNode) existing.parentNode.removeChild(existing);
          }, { once: true });
        }
      });

      for (let j = words.length; j < children.length; j++) {
        const extra = children[j];
        extra.classList.add("old-out");
        extra.addEventListener("animationend", () => {
          if (extra.parentNode) extra.parentNode.removeChild(extra);
        }, { once: true });
      }

      lastWords = words.slice();
    }

    function displayGroundTruth(text) {
      groundTruthEl.innerHTML = "";
      groundTruthWords = text.split(/\s+/).filter(w => w.length > 0);
      groundTruthWords.forEach(w => {
        const span = document.createElement("span");
        span.textContent = w;
        span.className = "word";
        groundTruthEl.appendChild(span);
      });
    }

    function highlightMismatches(decodedWords) {
      const children = Array.from(transcriptionEl.children);
      children.forEach((child, i) => {
        child.classList.remove("mismatch");
        if (i < decodedWords.length && i < groundTruthWords.length) {
          if (decodedWords[i] !== groundTruthWords[i]) {
            child.classList.add("mismatch");
          }
        } else if (i >= groundTruthWords.length) {
          child.classList.add("mismatch");
        }
      });
    }

    /* ---------- spectrogram drawing helpers ---------- */

    function drawSpectrogramFrameTo(ctx, x, t) {
      if (!spectrogram || t < 0 || t >= totalFrames) return;

      const bins = spectrogram.length;
      const binH = H / bins;

      for (let b = 0; b < bins; b++) {
        const v = spectrogram[b][t];
        ctx.fillStyle = `rgb(${v * 255}, ${v * 120}, ${v * 255})`;
        ctx.fillRect(
          x,
          H - (b + 1) * binH,
          FRAME_WIDTH,
          binH
        );
      }
    }

    /* ---------- initial spectrogram render (full canvas) ---------- */

    function drawInitialSpectrogram() {
      const fullW = Math.max(W, Math.ceil(totalFrames * FRAME_WIDTH));
      specLayer.width = fullW;
      specLayer.height = H;
      specLayer.style.width = fullW + 'px';
      specLayer.style.height = H + 'px';

      specCtx.fillStyle = "black";
      specCtx.fillRect(0, 0, fullW, H);

      for (let t = 0; t < totalFrames; t++) {
        const x = t * FRAME_WIDTH;
        drawSpectrogramFrameTo(specCtx, x, t);
      }

      currentFrame = ASR_DELAY_FRAMES;
      currentTranscriptionIndex = 0;
      specLayer.style.transform = `translateX(${centerX() - currentFrame * FRAME_WIDTH}px)`;
    }

    /* ---------- animation loop ---------- */

    function tick() {
      if (!running) return;

      if (currentFrame >= totalFrames - 1) {
        console.log("Spectrogram finished");
        running = false;
        setControlsEnabled(true);

        highlightMismatches(lastWords);
        return;
      }

      currentFrame++;
      specLayer.style.transform = `translateX(${centerX() - currentFrame * FRAME_WIDTH}px)`;

      // Check if we need to update the transcription
      while (
        currentTranscriptionIndex < transcriptions.length &&
        currentFrame >= transcriptions[currentTranscriptionIndex].frame
      ) {
        updateTranscription(transcriptions[currentTranscriptionIndex].text);
        currentTranscriptionIndex++;
      }

      setTimeout(tick, FRAME_MS);
    }

    function rewindSpectrogram() {
      return new Promise((resolve) => {
        isRewinding = true;
        const startFrame = currentFrame;
        const duration = 500; // ms
        const startTime = performance.now();

        function rewindTick(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);

          currentFrame = Math.floor(startFrame * (1 - progress));
          specLayer.style.transform = `translateX(${centerX() - currentFrame * FRAME_WIDTH}px)`;

          if (progress < 1) {
            requestAnimationFrame(rewindTick);
          } else {
            currentFrame = ASR_DELAY_FRAMES;
            currentTranscriptionIndex = 0;
            specLayer.style.transform = `translateX(${centerX() - currentFrame * FRAME_WIDTH}px)`;
            isRewinding = false;
            resolve();
          }
        }

        requestAnimationFrame(rewindTick);
      });
    }

    /* ---------- controls ---------- */

    trialSelect.addEventListener("change", async (e) => {
      const newTrial = parseInt(e.target.value, 10);
      currentTrial = newTrial;

      // Clear previous transcription
      transcriptionEl.innerHTML = "";
      lastWords = [];

      await loadTrialData(newTrial);
    });

    playBtn.addEventListener("click", async () => {
      if (running || !spectrogram || isRewinding || playBtn.classList.contains("disabled")) return;

      // Rewind if a transcription has already been completed
      if (currentFrame > ASR_DELAY_FRAMES) {
        setControlsEnabled(false);
        transcriptionEl.innerHTML = "";
        lastWords = [];

        await rewindSpectrogram();
      }

      running = true;
      currentTranscriptionIndex = 0;
      setControlsEnabled(false);
      tick();
    });

    // Load the initial trial on page load
    loadTrialData(0);
  </script>
</body>

</html>
